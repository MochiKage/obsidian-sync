<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian Sync Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/diff2html@3.4.47/bundles/css/diff2html.min.css"/>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Top Bar -->
<header id="topbar">
  <span id="brand">Obsidian Sync</span>
  <div id="vault-selector" class="vault-selector">
    <span id="vault-path" class="dim" title="点击更换库文件夹">📁 加载中...</span>
    <button id="btn-change-vault" class="btn-small" title="更换库文件夹">切换</button>
  </div>
  <span id="status-badge" class="badge">checking...</span>
  <span id="file-count" class="dim"></span>
  <button id="btn-dry-run" class="btn-outline">预览</button>
  <button id="btn-sync" class="btn-primary">立即同步</button>
</header>

<!-- Main Layout -->
<div id="main">

  <!-- Left Column: File List -->
  <section id="panel-files" class="panel">
    <div class="panel-header">
      <h2>文件状态</h2>
      <select id="filter-select">
        <option value="all">全部</option>
        <option value="pending">待同步</option>
        <option value="conflict">冲突</option>
      </select>
    </div>
    <div id="file-list" class="scroll-list"></div>
  </section>

  <!-- Middle Column: History -->
  <section id="panel-history" class="panel">
    <div class="panel-header">
      <h2>变更历史</h2>
      <button id="btn-search" class="btn-small">🔍</button>
    </div>
    <div id="history-list" class="scroll-list"></div>
  </section>

  <!-- Right Column: Detail / Diff / Log -->
  <section id="panel-detail" class="panel">
    <div class="panel-header">
      <div class="tab-bar">
        <button class="tab active" data-tab="detail">详情</button>
        <button class="tab" data-tab="log">日志</button>
      </div>
      <div id="detail-actions"></div>
    </div>
    <div id="detail-content" class="scroll-list tab-content active" data-tab="detail">
      <div class="placeholder">点击左侧文件或中间历史记录<br>查看 diff 详情</div>
    </div>
    <div id="log-content" class="scroll-list tab-content" data-tab="log">
      <div class="placeholder">同步操作日志<br>执行同步后在此显示</div>
    </div>
  </section>

</div>

<!-- Bottom Bar -->
<footer id="bottombar">
  <span id="health-summary" class="dim">健康检查中...</span>
  <span id="last-sync-time" class="dim"></span>
</footer>

<!-- Search Modal -->
<div id="search-modal" class="modal hidden">
  <div class="modal-box">
    <h3>搜索变更历史</h3>
    <input type="text" id="search-input" placeholder="输入关键词...">
    <button id="search-submit" class="btn-primary">搜索</button>
    <div id="search-results"></div>
    <button class="btn-outline modal-close">关闭</button>
  </div>
</div>

<!-- Folder Browser Modal -->
<div id="browse-modal" class="modal hidden">
  <div class="modal-box browse-box">
    <h3>选择 Obsidian 库文件夹</h3>
    <div id="browse-breadcrumb" class="browse-breadcrumb"></div>
    <div id="browse-list" class="browse-list"></div>
    <div class="browse-footer">
      <button id="browse-select" class="btn-primary" disabled>选择此文件夹</button>
      <button class="btn-outline modal-close">取消</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/diff2html@3.4.47/bundles/js/diff2html-ui.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
