<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian Sync Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/diff2html@3.4.47/bundles/css/diff2html.min.css"/>
<link rel="stylesheet" href="/static/style.css?v=20260624">
</head>
<body>

<!-- Top Bar -->
<header id="topbar">
  <span id="brand">Obsidian Sync <span style="font-size:10px;opacity:.5;">v2</span></span>
  <div id="vault-selector" class="vault-selector">
    <span id="vault-path" class="dim" title="点击更换库文件夹">📁 加载中...</span>
    <button id="btn-change-vault" class="btn-small" title="更换库文件夹">切换</button>
  </div>
  <span id="status-badge" class="badge">checking...</span>
  <span id="file-count" class="dim"></span>
  <button id="btn-dry-run" class="btn-outline">预览</button>
  <button id="btn-sync" class="btn-primary">立即同步</button>
  <button id="btn-sync-all" class="btn-outline" title="跳过暂存区，直接同步全部变更">⚡ 同步全部</button>
</header>

<!-- Main Layout -->
<div id="main">

  <!-- Left Column: File List + Staging -->
  <section id="panel-files" class="panel">
    <div class="panel-header">
      <h2>文件状态</h2>
      <select id="filter-select">
        <option value="all">全部</option>
        <option value="pending">待同步</option>
        <option value="conflict">冲突</option>
      </select>
    </div>

    <!-- Vault file tree -->
    <div class="file-section">
      <div class="stage-bar">
        <label class="check-all"><input type="checkbox" id="vault-check-all"> 全选</label>
        <button id="btn-stage-add" class="btn-small" disabled>↓ 暂存</button>
      </div>
      <div id="file-list" class="scroll-list"></div>
    </div>

    <!-- Staging area -->
    <div class="file-section" id="staging-section">
      <div class="stage-header">
        <span id="staging-count">暂存区 (0)</span>
        <button id="btn-stage-clear" class="btn-small">清空</button>
      </div>
      <div class="stage-bar">
        <label class="check-all"><input type="checkbox" id="staging-check-all"> 全选</label>
        <button id="btn-stage-remove" class="btn-small" disabled>↑ 移除</button>
      </div>
      <div id="staging-list" class="scroll-list">
        <div class="placeholder">选择文件后点击「↓ 暂存」<br>添加到此处</div>
      </div>
    </div>
  </section>

  <!-- Middle Column: History -->
  <section id="panel-history" class="panel">
    <div class="panel-header">
      <h2>变更历史</h2>
      <button id="btn-search" class="btn-small">🔍</button>
    </div>
    <div id="history-list" class="scroll-list"></div>
  </section>

  <!-- Right Column: Detail / Diff / Log -->
  <section id="panel-detail" class="panel">
    <div class="panel-header">
      <span id="detail-title" style="font-size:12px;color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      <div class="tab-bar">
        <button class="tab active" data-tab="detail">详情</button>
        <button class="tab" data-tab="log">日志</button>
      </div>
      <div id="detail-actions"></div>
    </div>
    <div id="detail-content" class="scroll-list tab-content active" data-tab="detail">
      <div class="placeholder">点击左侧文件或中间历史记录<br>查看 diff 详情</div>
    </div>
    <div id="log-content" class="scroll-list tab-content" data-tab="log">
      <div class="placeholder">同步操作日志<br>执行同步后在此显示</div>
    </div>
  </section>

</div>

<!-- Bottom Bar -->
<footer id="bottombar">
  <span id="health-summary" class="dim">健康检查中...</span>
  <span id="last-sync-time" class="dim"></span>
</footer>

<!-- Search Modal -->
<div id="search-modal" class="modal hidden">
  <div class="modal-box">
    <h3>搜索变更历史</h3>
    <input type="text" id="search-input" placeholder="输入关键词...">
    <button id="search-submit" class="btn-primary">搜索</button>
    <div id="search-results"></div>
    <button class="btn-outline modal-close">关闭</button>
  </div>
</div>

<!-- Pending Changes Modal -->
<div id="pending-modal" class="modal hidden">
  <div class="modal-box wide-box">
    <h3 id="pending-title">变更详情</h3>
    <div id="pending-summary" class="pending-summary"></div>
    <div id="pending-list" class="pending-list"></div>
    <button class="btn-outline modal-close" style="margin-top:12px;">关闭</button>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="delete-confirm-modal" class="modal hidden">
  <div class="modal-box wide-box">
    <h3>⚠️ 删除确认</h3>
    <p class="dim" style="margin:8px 0;">同步检测到以下文件将被<strong style="color:var(--red);">删除</strong>，请确认：</p>
    <div id="delete-confirm-list" class="pending-list" style="max-height:40vh;"></div>
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;">
      <button id="btn-delete-skip" class="btn-outline">保留文件（跳过删除）</button>
      <button id="btn-delete-proceed" class="btn-primary" style="background:var(--red);">确认删除</button>
      <button id="btn-delete-push-anyway" class="btn-primary" style="background:var(--accent);">仍然推送</button>
    </div>
    <p class="dim" style="font-size:11px;margin-top:6px;">「仍然推送」= 不删文件，把文件重新推送到平板（删除操作转为推送）</p>
  </div>
</div>

<!-- Empty Staging Warning Modal -->
<div id="empty-staging-modal" class="modal hidden">
  <div class="modal-box">
    <h3>暂存区为空</h3>
    <p class="dim" style="margin:12px 0;">暂存区没有文件，将对<strong>所有变更文件</strong>执行同步。</p>
    <p class="dim">建议先选择需要同步的文件添加到暂存区。</p>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
      <button class="btn-outline modal-close">取消</button>
      <button id="btn-empty-staging-go" class="btn-primary">仍然同步</button>
    </div>
  </div>
</div>

<!-- Health Detail Modal -->
<div id="health-modal" class="modal hidden">
  <div class="modal-box wide-box">
    <h3>健康检查详情</h3>
    <div id="health-detail-content" class="health-detail-content"></div>
    <button class="btn-outline modal-close" style="margin-top:12px;">关闭</button>
  </div>
</div>

<!-- Folder Browser Modal -->
<div id="browse-modal" class="modal hidden">
  <div class="modal-box browse-box">
    <h3>选择 Obsidian 库文件夹</h3>
    <div id="browse-breadcrumb" class="browse-breadcrumb"></div>
    <div id="browse-list" class="browse-list"></div>
    <div class="browse-footer">
      <button id="browse-select" class="btn-primary" disabled>选择此文件夹</button>
      <button class="btn-outline modal-close">取消</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/diff2html@3.4.47/bundles/js/diff2html-ui.min.js"></script>
<script src="/static/app.js?v=20260624"></script>
</body>
</html>
